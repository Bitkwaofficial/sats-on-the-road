<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Wall moderation</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: #0b0d12; color: #f6efe3; padding: 24px; line-height: 1.5;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  h2 { font-size: 15px; text-transform: uppercase; letter-spacing: .08em; color: rgba(246,239,227,.6); margin: 32px 0 12px; }
  .sub { color: rgba(246,239,227,.6); font-size: 13px; margin: 0 0 20px; }
  .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  input[type=password] {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.18);
    color: #f6efe3; border-radius: 8px; padding: 9px 12px; font: inherit; min-width: 260px;
  }
  button {
    font: inherit; cursor: pointer; border-radius: 8px; padding: 8px 14px;
    border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.06); color: #f6efe3;
  }
  button.primary { background: #F7931A; border-color: #F7931A; color: #0b0d12; font-weight: 700; }
  button.reject, button.remove { border-color: rgba(232,87,138,.5); color: #ff9aa8; }
  button:disabled { opacity: .5; cursor: default; }
  .card {
    break-inside: avoid; border: 1px solid rgba(255,255,255,.14); border-radius: 12px;
    padding: 16px 16px 14px; margin: 0 0 14px; background: rgba(255,255,255,.03);
  }
  .msg { font-size: 17px; margin: 0 0 10px; }
  .meta { font-size: 12px; color: rgba(246,239,227,.6); margin-bottom: 12px; }
  .meta b { color: #f6efe3; }
  .actions { display: flex; gap: 8px; }
  .note { color: rgba(246,239,227,.6); font-size: 14px; }
  .err { color: #ff9aa8; }
  a { color: #F7931A; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Wall of Support — moderation</h1>
  <p class="sub">Approve to publish instantly, reject to discard, or remove an already-published note. <a href="/wall" target="_blank">View the live wall →</a></p>

  <div class="bar">
    <input id="token" type="password" placeholder="Admin token" autocomplete="off" />
    <button class="primary" id="load">Load</button>
    <span id="status" class="note"></span>
  </div>

  <h2>Pending review <span id="pendingCount" class="note"></span></h2>
  <div id="pendingList"></div>
  <p id="pendingEmpty" class="note" hidden>Nothing waiting. 🎉</p>

  <h2>Published <span id="pubCount" class="note"></span></h2>
  <div id="pubList"></div>
  <p id="pubEmpty" class="note" hidden>No published messages yet (the wall is showing the seed samples).</p>
</div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  const hash = new URLSearchParams(location.hash.slice(1));
  if (hash.get("t")) $("token").value = hash.get("t");
  const token = () => $("token").value.trim();

  let pending = [];
  let published = [];

  async function api(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ "x-admin-token": token() }, opts.headers || {});
    const r = await fetch(path, opts);
    return { status: r.status, body: await r.json().catch(() => ({})) };
  }

  function cardHtml(m, kind, i) {
    const buttons = kind === "pending"
      ? '<button class="primary" data-act="approve">Approve</button><button class="reject" data-act="reject">Reject</button>'
      : '<button class="remove" data-act="unpublish">Remove</button>';
    return `<div class="card" data-kind="${kind}" data-idx="${i}">
        <p class="msg">${esc(m.msg)}</p>
        <div class="meta"><b>${esc(m.name || "Anonymous")}</b>${m.place ? " · " + esc(m.place) : ""}${m.date ? " · " + esc(m.date) : ""}</div>
        <div class="actions">${buttons}</div>
      </div>`;
  }

  async function loadList(endpoint, listEl, countEl, emptyEl, kind) {
    const r = await api(endpoint);
    if (r.status === 401) { $("status").innerHTML = '<span class="err">Invalid token.</span>'; return false; }
    if (r.status !== 200) { countEl.innerHTML = '<span class="err">error</span>'; return true; }
    const items = (r.body && r.body.items) || [];
    if (kind === "pending") pending = items; else published = items;
    countEl.textContent = "(" + items.length + ")";
    emptyEl.hidden = items.length > 0;
    listEl.innerHTML = items.map((m, i) => cardHtml(m, kind, i)).join("");
    return true;
  }

  async function loadAll() {
    $("status").textContent = "Loading…";
    const ok = await loadList("/api/wall/pending", $("pendingList"), $("pendingCount"), $("pendingEmpty"), "pending");
    if (ok) await loadList("/api/wall/approved", $("pubList"), $("pubCount"), $("pubEmpty"), "published");
    if ($("status").textContent === "Loading…") $("status").textContent = "";
  }

  async function moderate(payload, card) {
    card.querySelectorAll("button").forEach((b) => (b.disabled = true));
    const r = await api("/api/wall/moderate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (r.status === 200 && r.body && r.body.ok) {
      const list = card.parentElement;
      card.remove();
      const count = list.querySelectorAll(".card").length;
      if (list === $("pendingList")) { $("pendingCount").textContent = "(" + count + ")"; $("pendingEmpty").hidden = count > 0; }
      else { $("pubCount").textContent = "(" + count + ")"; $("pubEmpty").hidden = count > 0; }
    } else {
      card.querySelectorAll("button").forEach((b) => (b.disabled = false));
      alert("Failed: " + (r.body && r.body.error ? r.body.error : r.status));
    }
  }

  document.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-act]");
    if (!btn) return;
    const card = btn.closest(".card");
    if (!card) return;
    const kind = card.getAttribute("data-kind");
    const item = (kind === "pending" ? pending : published)[+card.getAttribute("data-idx")] || {};
    const action = btn.getAttribute("data-act");
    // Send id when present plus content, so unpublish works even for older
    // published notes that predate ids (matched by content server-side).
    moderate({
      action: action,
      id: item.id || "",
      name: item.name || "",
      place: item.place || "",
      msg: item.msg || "",
      date: item.date || "",
    }, card);
  });

  $("load").addEventListener("click", loadAll);
  if (token()) loadAll();
})();
</script>
</body>
</html>
